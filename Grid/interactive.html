      #grid-container {

        display: grid;
        grid-template-columns: repeat(4, 1fr);

        margin: 0 auto;

        margin-top: 50px;
        box-shadow: 3px 3px 15px 0px rgb(68, 113, 99);
      }

        align-items: center;
        border: black;

        font-size:40px;
        
      }
      .input{
        display: flex;
        justify-content: center;
        margin-top: 10px;
        align-items: center;
        
      }
    </style>
  </head>
