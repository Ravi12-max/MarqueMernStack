<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: antiquewhite;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #tiranga{
            display: grid;
            grid-template-rows: repeat(3,100px);
            background-color: aliceblue;
            width: 700px;
            height: auto;
            margin-left:20px ;
            margin-top: 20px;
            border: none;
            box-shadow: 3px -3px rgb(206, 204, 201);
            
        }
        #top{
            background-color: orange;
        }
        #bottom{
            background-color: green;
        }

    </style>
</head>
<body>
    <div id="tiranga">
        <div id="top"></div>
        <div id="mid">
            <img src="chakra.jpg" alt="star" style="width:100px; display: flex; justify-content: center; align-items: center; margin-left: 300px; border-radius: 100px; background-color: white; ">
        </div>
        <div id="bottom"></div>
    </div>
</body>
</html>
